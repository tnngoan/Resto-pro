version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: restopro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: restopro
      POSTGRES_PASSWORD: restopro_dev_password
      POSTGRES_DB: restopro_db
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=en_US.UTF-8'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U restopro -d restopro_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restopro_network

  redis:
    image: redis:7-alpine
    container_name: restopro_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restopro_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  restopro_network:
    driver: bridge
